<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md text-center">

        <img src="github-logo.png" alt="GitHub Logo" class="w-20 mx-auto mb-4">

        <h1 class="text-2xl font-bold text-gray-800">
            GitHub Issues Tracker
        </h1>
        <p class="text-gray-500 mb-6">
            Sign in to manage your issues
        </p>

        <form id="loginForm">
            
            <div class="mb-4">
                <input 
                    id="username" 
                    type="text" 
                    placeholder="Username"
                    class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                    required
                >
                <p id="userError" class="text-red-500 text-sm mt-1 text-left"></p>
            </div>

            <div class="mb-4">
                <input 
                    id="password" 
                    type="password" 
                    placeholder="Password"
                    class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                    required
                >
                <p id="passError" class="text-red-500 text-sm mt-1 text-left"></p>
            </div>

            <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded font-bold transition duration-200">
                Sign In
            </button>

            <p id="successMsg" class="text-green-600 text-sm mt-3"></p>

            <p class="text-xs text-gray-400 mt-6 pt-4 border-t">
                Demo Credentials: <span class="font-mono text-gray-600">admin / admin123</span>
            </p>
            
        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
