<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <p id="loginMessage" class="text-red-500 text-sm mt-3"></p>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md text-center">

        <img 
            src="github-logo.png"
            class="w-20 mx-auto mb-4"
        >

        <h1 class="text-2xl font-bold text-gray-800">
            GitHub Issues Tracker
        </h1>

        <p class="text-gray-500 mb-8">
            Sign in to manage your issues
        </p>

        <form id="loginForm">

            <input
                id="username"
                type="text"
                placeholder="Username"
                class="w-full p-3 border rounded mb-1"
                required
            >

            <p id="userError" class="text-red-500 text-sm mb-2"></p>

            <input
                id="password"
                type="password"
                placeholder="Password"
                class="w-full p-3 border rounded mb-1"
                required
            >

            <p id="passError" class="text-red-500 text-sm mb-3"></p>

            <button
                class="w-full bg-indigo-600 text-white py-3 rounded font-bold"
            >
                Sign In
            </button>

            <p id="successMsg" class="text-green-600 text-sm mt-3"></p>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
