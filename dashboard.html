<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100">

    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center">

        <div class="flex items-center gap-2">

            <img 
                src="github-logo.png"
                class="w-8"
            >

            <span class="font-bold text-lg">
                GitHub Issues Tracker
            </span>

        </div>

        <div class="flex items-center gap-2">

            <input
                type="text"
                id="searchInput"
                placeholder="Search issues..."
                class="border rounded-md text-sm w-72 px-3 py-2"
            >

            <button
                onclick="searchIssues()"
                class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-semibold"
            >
                Search
            </button>

        </div>

    </nav>

    <main class="max-w-7xl mx-auto p-6">

        <div class="bg-white border rounded-lg p-3 mb-6">

            <div class="flex gap-2">

                <button 
                    onclick="changeTab('all')" 
                    id="tab-all"
                    class="tab-btn active px-4 py-1.5 rounded text-sm"
                >
                    All
                </button>

                <button 
                    onclick="changeTab('open')" 
                    id="tab-open"
                    class="tab-btn px-4 py-1.5 rounded text-sm"
                >
                    Open
                </button>

                <button 
                    onclick="changeTab('closed')" 
                    id="tab-closed"
                    class="tab-btn px-4 py-1.5 rounded text-sm"
                >
                    Closed
                </button>

            </div>

        </div>

        <div class="bg-white border rounded-t-xl p-5 flex justify-between items-center">

            <div class="flex items-center gap-3">

                <img src="icons/50Issues.png" class="w-7">

                <div>

                    <h2 class="text-xl font-bold" id="issueCount">
                        0 Issues
                    </h2>

                    <p class="text-xs text-gray-500">
                        Track and manage your project issues
                    </p>

                </div>

            </div>

            <div class="flex gap-4 text-xs font-semibold">

                <span class="flex items-center gap-1 text-green-600">

                    <img src="icons/Open-Status.png" class="w-3">

                    Open

                </span>

                <span class="flex items-center gap-1 text-purple-600">

                    <img src="icons/Closed- Status.png" class="w-3">

                    Closed

                </span>

            </div>

        </div>

        <div id="loader" class="hidden flex justify-center py-10">

            <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent"></div>

        </div>

        <div
            id="issueGrid"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-white border border-t-0 p-5 rounded-b-xl min-h-[400px]"
        >
        </div>

    </main>

    <div
        id="issueModal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center"
    >

        <div class="bg-white p-8 rounded-xl shadow-2xl w-[500px]">

            <h2 id="m-title" class="text-xl font-bold mb-2"></h2>

            <p class="text-xs mb-3">

                <span 
                    id="m-status"
                    class="px-2 py-1 rounded text-xs font-bold"
                >
                    Opened
                </span>

                <span id="m-meta"></span>

            </p>

            <div id="m-labels" class="flex gap-2 mb-4"></div>

            <p id="m-desc" class="text-sm text-gray-600 mb-6"></p>

            <div class="flex justify-between border-t pt-3 text-sm">

                <div>

                    <p class="text-gray-400 text-xs">
                        Assignee
                    </p>

                    <p id="m-assignee" class="font-bold"></p>

                </div>

                <div>

                    <p class="text-gray-400 text-xs">
                        Priority
                    </p>

                    <p id="m-priority" class="font-bold"></p>

                </div>

            </div>

            <div class="flex justify-end mt-6">

                <button
                    onclick="closeModal()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded"
                >
                    Close
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
